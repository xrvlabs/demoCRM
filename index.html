<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BizCRM - Authentication</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Iceland&family=JetBrains+Mono:wght@400;500;600;700&family=Play:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Global Resets */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent !important;
}

*:focus {
    outline: none !important;
}

button::-moz-focus-inner {
    border: 0;
}

:root {
    --primary: #7c3aed;
    --secondary: #a78bfa;
    --accent: #f472b6;
    --bg: #f0f4ff;
    --card-bg: #e8eeff;
    --text: #1e1b4b;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --error: #ef4444;
    --success: #10b981;
    --radius: 5px; 
    
    --font-display: 'Iceland', cursive;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Space Grotesk', sans-serif;
    --font-ui: 'Play', sans-serif;
}

html,body{height:100%;overflow:hidden;overscroll-behavior:none}

::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

body, input, select, textarea {
    font-family: var(--font-body);
    text-transform: uppercase;
    background: linear-gradient(-45deg, #f0f4ff, #e8eeff, #fdf2f8, #f5f3ff);
    background-size: 400% 400%;
    animation: smoothBg 15s ease infinite;
    color: var(--text);
    line-height: 1.5;
}

@keyframes smoothBg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

button, label, .btn-text {
    font-family: var(--font-ui);
    text-transform: uppercase;
}
h1, h2, h3, .form-title, .brand-text {
    font-family: var(--font-display);
    letter-spacing: 1px;
}
.form-subtitle {
    text-transform: none;
    font-family: var(--font-body);
}
#loginPass, #signupPass { text-transform: none; }
#businessName { text-transform: capitalize; }

/* Utilities */
.gradient-bg {
    background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #f472b6 100%);
}
.gradient-text {
    background: linear-gradient(135deg, #7c3aed, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.clay {
    background: linear-gradient(145deg, #ffffff, #e8eeff);
    border-radius: var(--radius);
    box-shadow: 6px 6px 16px rgba(166,180,200,0.5), -6px -6px 16px rgba(255,255,255,0.9);
}
.clay-inset {
    background: linear-gradient(145deg, #dde4f6, #f5f8ff);
    border-radius: var(--radius);
    box-shadow: inset 4px 4px 10px rgba(166,180,200,0.5), inset -4px -4px 10px rgba(255,255,255,0.9);
}

/* ===== FLOATING CRM BACKGROUND ===== */
.floating-bg {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.floating-icon {
    position: absolute;
    opacity: 0.08;
    color: var(--primary);
    animation: floatIcon 20s ease-in-out infinite;
}

.floating-icon svg {
    width: 100%;
    height: 100%;
}

.floating-icon:nth-child(1) { top: 5%; left: 5%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 25s; }
.floating-icon:nth-child(2) { top: 15%; right: 10%; width: 60px; height: 60px; animation-delay: -3s; animation-duration: 22s; }
.floating-icon:nth-child(3) { top: 35%; left: 8%; width: 70px; height: 70px; animation-delay: -5s; animation-duration: 28s; }
.floating-icon:nth-child(4) { top: 55%; right: 5%; width: 90px; height: 90px; animation-delay: -8s; animation-duration: 24s; }
.floating-icon:nth-child(5) { top: 75%; left: 12%; width: 55px; height: 55px; animation-delay: -2s; animation-duration: 26s; }
.floating-icon:nth-child(6) { top: 85%; right: 15%; width: 65px; height: 65px; animation-delay: -6s; animation-duration: 23s; }
.floating-icon:nth-child(7) { top: 25%; left: 85%; width: 75px; height: 75px; animation-delay: -4s; animation-duration: 27s; }
.floating-icon:nth-child(8) { top: 65%; left: 3%; width: 50px; height: 50px; animation-delay: -7s; animation-duration: 21s; }
.floating-icon:nth-child(9) { top: 10%; left: 75%; width: 45px; height: 45px; animation-delay: -1s; animation-duration: 29s; }
.floating-icon:nth-child(10) { top: 45%; right: 12%; width: 85px; height: 85px; animation-delay: -9s; animation-duration: 20s; }
.floating-icon:nth-child(11) { top: 90%; left: 60%; width: 40px; height: 40px; animation-delay: -3.5s; animation-duration: 24s; }
.floating-icon:nth-child(12) { top: 20%; left: 20%; width: 35px; height: 35px; animation-delay: -5.5s; animation-duration: 26s; }
.floating-icon:nth-child(13) { top: 70%; right: 25%; width: 55px; height: 55px; animation-delay: -7.5s; animation-duration: 22s; }
.floating-icon:nth-child(14) { top: 40%; left: 92%; width: 48px; height: 48px; animation-delay: -2.5s; animation-duration: 25s; }
.floating-icon:nth-child(15) { top: 80%; left: 30%; width: 42px; height: 42px; animation-delay: -6.5s; animation-duration: 28s; }
.floating-icon:nth-child(16) { top: 3%; left: 45%; width: 58px; height: 58px; animation-delay: -4.5s; animation-duration: 23s; }

/* Connection Lines */
.floating-line {
    position: absolute;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.04;
    animation: floatLine 15s ease-in-out infinite;
}

.floating-line:nth-child(17) { top: 20%; left: 0; width: 40%; height: 2px; animation-delay: 0s; }
.floating-line:nth-child(18) { top: 50%; right: 0; width: 35%; height: 2px; animation-delay: -3s; transform: rotate(-5deg); }
.floating-line:nth-child(19) { top: 80%; left: 10%; width: 30%; height: 2px; animation-delay: -6s; transform: rotate(3deg); }
.floating-line:nth-child(20) { top: 35%; right: 5%; width: 25%; height: 2px; animation-delay: -2s; transform: rotate(-8deg); }

/* Floating Orbs */
.floating-orb {
    position: absolute;
    border-radius: 50%;
    animation: floatOrb 18s ease-in-out infinite;
}

.floating-orb:nth-child(21) { top: 15%; left: 25%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%); animation-delay: 0s; }
.floating-orb:nth-child(22) { top: 60%; right: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(244,114,182,0.05) 0%, transparent 70%); animation-delay: -5s; }
.floating-orb:nth-child(23) { top: 40%; left: 60%; width: 180px; height: 180px; background: radial-gradient(circle, rgba(167,139,250,0.05) 0%, transparent 70%); animation-delay: -10s; }
.floating-orb:nth-child(24) { top: 75%; left: 10%; width: 150px; height: 150px; background: radial-gradient(circle, rgba(124,58,237,0.04) 0%, transparent 70%); animation-delay: -3s; }

/* Data Dots */
.floating-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--primary);
    border-radius: 50%;
    opacity: 0.15;
    animation: floatDot 12s ease-in-out infinite;
}

.floating-dot:nth-child(25) { top: 12%; left: 35%; animation-delay: 0s; }
.floating-dot:nth-child(26) { top: 28%; right: 30%; animation-delay: -2s; }
.floating-dot:nth-child(27) { top: 45%; left: 15%; animation-delay: -4s; }
.floating-dot:nth-child(28) { top: 62%; right: 40%; animation-delay: -1s; }
.floating-dot:nth-child(29) { top: 78%; left: 55%; animation-delay: -3s; }
.floating-dot:nth-child(30) { top: 88%; right: 35%; animation-delay: -5s; }
.floating-dot:nth-child(31) { top: 8%; left: 65%; animation-delay: -2.5s; }
.floating-dot:nth-child(32) { top: 52%; left: 88%; animation-delay: -4.5s; }

@keyframes floatIcon {
    0%, 100% {
        transform: translateY(0) rotate(0deg) scale(1);
    }
    25% {
        transform: translateY(-20px) rotate(5deg) scale(1.05);
    }
    50% {
        transform: translateY(-10px) rotate(-3deg) scale(0.95);
    }
    75% {
        transform: translateY(-25px) rotate(8deg) scale(1.02);
    }
}

@keyframes floatLine {
    0%, 100% {
        transform: translateX(0) scaleX(1);
        opacity: 0.04;
    }
    50% {
        transform: translateX(20px) scaleX(1.1);
        opacity: 0.08;
    }
}

@keyframes floatOrb {
    0%, 100% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    33% {
        transform: translate(30px, -20px) scale(1.1);
        opacity: 0.8;
    }
    66% {
        transform: translate(-20px, 15px) scale(0.9);
        opacity: 0.6;
    }
}

@keyframes floatDot {
    0%, 100% {
        transform: translate(0, 0);
        opacity: 0.15;
    }
    25% {
        transform: translate(10px, -15px);
        opacity: 0.25;
    }
    50% {
        transform: translate(-5px, -25px);
        opacity: 0.1;
    }
    75% {
        transform: translate(15px, -10px);
        opacity: 0.2;
    }
}

/* ===== Layout ===== */
.auth-container{display:flex;height:100%;width:100%; justify-content:center; align-items:center; position: relative; z-index: 1;}

.auth-form-container{flex:1;display:flex;flex-direction:column;height:100%;overflow-y:auto;padding:1.5rem 1rem 1rem;position:relative;justify-content:flex-start; z-index: 2;}

.auth-form-wrapper{width:100%;max-width:100%;margin:0 auto;display:flex;flex-direction:column;padding:0;}

.mobile-brand{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;justify-content:center}
.mobile-brand h1{font-size:1.75rem;font-weight:700;display:flex;align-items:center;gap:0.5rem}
.mobile-brand h1 svg{width:28px;height:28px}

/* Slider Tabs */
.slider-tabs {
    display: flex;
    position: relative;
    border-radius: var(--radius);
    padding: 0.3rem;
}
.slider-tab {
    flex: 1;
    padding: 0.6rem 1rem;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.875rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: calc(var(--radius) - 2px);
    transition: color 0.4s ease;
    font-family: var(--font-ui);
    position: relative;
    z-index: 2;
}
.slider-tab.active {
    color: var(--primary);
}
.tab-slider {
    position: absolute;
    top: 0.3rem;
    bottom: 0.3rem;
    left: 0.3rem;
    width: calc(50% - 0.3rem);
    background: linear-gradient(145deg, #ffffff, #e8eeff);
    border-radius: calc(var(--radius) - 2px);
    box-shadow: 2px 2px 6px rgba(166,180,200,0.4), -2px -2px 6px rgba(255,255,255,0.8);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
}

.form-section{display:none;flex:1}
.form-section.active{display:flex;flex-direction:column;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.form-header{margin-bottom:1.5rem;text-align:center}
.form-title{font-size:1.5rem;font-weight:700;margin-bottom:0.25rem}

/* Form Elements */
.form-body{flex:1;display:flex;flex-direction:column}
.form-grid{display:grid;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:0.35rem}
.form-label{font-size:0.75rem;font-weight:700;color:var(--text);letter-spacing:0.5px}

/* Password Smooth Collapse */
.password-transition {
    transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;
    max-height: 150px;
    opacity: 1;
    overflow: hidden;
    margin-top: 0;
}
.password-transition.collapsed {
    max-height: 0;
    opacity: 0;
    margin-top: -1rem;
    pointer-events: none;
}

/* Clay Inputs */
.input-wrapper{position:relative}
.form-input{width:100%;padding:0.75rem 1rem;background:linear-gradient(145deg, #dde4f6, #f5f8ff);border-radius:var(--radius);box-shadow:inset 3px 3px 8px rgba(166,180,200,0.5),inset -3px -3px 8px rgba(255,255,255,0.9);border:2px solid transparent;color:var(--text);font-size:0.875rem;transition:all 0.3s;outline:none}
.form-input:focus{border-color:var(--secondary)}
.form-input.input-error{border-color:var(--error);box-shadow:inset 3px 3px 8px rgba(239,68,68,0.2),inset -3px -3px 8px rgba(255,255,255,0.9)}
.form-input::placeholder{color:var(--text-muted);font-family:var(--font-body);text-transform:uppercase}
.input-icon{position:absolute;left:0.75rem;top:0;bottom:0;display:flex;align-items:center;color:var(--text-secondary);pointer-events:none}
.input-icon svg{width:16px;height:16px}
.input-wrapper .form-input{padding-left:2.5rem}
.password-toggle{position:absolute;right:0.25rem;top:0;bottom:0;display:flex;align-items:center;background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:0.5rem;}
.password-toggle svg{width:16px;height:16px;display:block}

/* Misc Form Layout */
.form-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;font-size:0.75rem;margin-top:0.25rem}
.checkbox-wrapper{display:flex;align-items:center;gap:0.4rem}
.checkbox-wrapper input{width:14px;height:14px;accent-color:var(--primary);cursor:pointer}
.checkbox-wrapper label{font-size:0.75rem;color:var(--text-secondary);cursor:pointer;font-weight:600}
.forgot-link{font-size:0.75rem;color:var(--primary);text-decoration:none;font-weight:700;font-family:var(--font-ui)}

/* Buttons */
.btn{width:100%;padding:0.75rem 1rem;border:none;border-radius:var(--radius);font-size:0.875rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;min-height:44px;}
.btn-primary{background:linear-gradient(145deg, #8b5cf6, #6d28d9);color:white;box-shadow:5px 5px 12px rgba(109,40,217,0.3), -5px -5px 12px rgba(255,255,255,0.9)}
.btn-primary:active:not(:disabled){box-shadow:inset 4px 4px 10px rgba(0,0,0,0.2),inset -4px -4px 10px rgba(255,255,255,0.2)}
.btn-primary:disabled{opacity:0.7;cursor:not-allowed}
.btn-outline{background:linear-gradient(145deg, #ffffff, #e8eeff);color:var(--text);box-shadow:5px 5px 12px rgba(166,180,200,0.5), -5px -5px 12px rgba(255,255,255,0.9)}
.btn-outline:active:not(:disabled){box-shadow:inset 4px 4px 10px rgba(166,180,200,0.5),inset -4px -4px 10px rgba(255,255,255,0.9)}
.btn-outline:disabled{opacity:0.7;cursor:not-allowed}
.btn svg{width:18px;height:18px;flex-shrink:0}

/* Status Buttons */
.btn-success{background:linear-gradient(145deg, #10b981, #059669)!important;color:#fff!important;box-shadow:5px 5px 12px rgba(16,185,129,0.3), -5px -5px 12px rgba(255,255,255,0.9)!important}
.btn-error{background:linear-gradient(145deg, #ef4444, #dc2626)!important;color:#fff!important;box-shadow:5px 5px 12px rgba(239,68,68,0.3), -5px -5px 12px rgba(255,255,255,0.9)!important}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}
.btn-shake{animation:shake 0.5s ease-in-out}
@keyframes spin{to{transform:rotate(360deg)}}
.btn .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 1s linear infinite;display:inline-block}

/* Dividers */
.divider{display:flex;align-items:center;margin:1.25rem 0;gap:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:2px;background:var(--card-bg);box-shadow: inset 1px 1px 2px rgba(166,180,200,0.3)}
.divider span{color:var(--text-muted);font-size:0.75rem;font-weight:700;font-family:var(--font-ui)}

/* Sheets & Dialogs */
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;opacity:0;visibility:hidden;transition:all 0.3s}
.sheet-overlay.active{opacity:1;visibility:visible}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(145deg, #ffffff, #f0f4ff);border-radius:var(--radius) var(--radius) 0 0;box-shadow:0 -8px 30px rgba(166,180,200,0.5);padding:1.5rem;z-index:101;transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto}
.bottom-sheet.active{transform:translateY(0)}
.side-sheet{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:400px;background:linear-gradient(145deg, #ffffff, #f0f4ff);box-shadow:-8px 0 30px rgba(166,180,200,0.5);z-index:101;transform:translateX(100%);transition:transform 0.3s ease;padding:1.5rem;overflow-y:auto}
.side-sheet.active{transform:translateX(0)}
.pc-dialog{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%) scale(0.95);width:90%;max-width:420px;background:linear-gradient(145deg, #ffffff, #f0f4ff);z-index:101;padding:2rem;border-radius:var(--radius);opacity:0;visibility:hidden;transition:all 0.3s ease;box-shadow: 10px 10px 30px rgba(166,180,200,0.6), -10px -10px 30px rgba(255,255,255,0.9);}
.pc-dialog.active{opacity:1;visibility:visible;transform:translate(-50%, -50%) scale(1)}
.sheet-handle{width:40px;height:5px;background:#d1d5db;border-radius:var(--radius);margin:0 auto 1.25rem;box-shadow:inset 1px 1px 3px rgba(0,0,0,0.1)}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.sheet-close{background:linear-gradient(145deg, #ffffff, #e8eeff);border-radius:var(--radius);box-shadow:3px 3px 8px rgba(166,180,200,0.5), -3px -3px 8px rgba(255,255,255,0.9);border:none;color:var(--text-secondary);cursor:pointer;padding:0.4rem;display:flex;align-items:center;justify-content:center;}
.sheet-close:active{box-shadow:inset 2px 2px 5px rgba(166,180,200,0.5),inset -2px -2px 5px rgba(255,255,255,0.9)}
.sheet-close svg{width:18px;height:18px}
.form-cols{display:grid;grid-template-columns:1fr;gap:1rem}

/* Desktop Responsiveness */
@media(min-width:480px){.form-cols{grid-template-columns:1fr 1fr}}
@media(min-width:768px){
  .floating-bg {
      display: block;
  }
  
  .auth-form-container{
      padding:2rem 3rem;
      justify-content:flex-start;
      align-items:center;
      overflow-y: auto;
  }
  
  .auth-form-wrapper{
      width: 100%;
      max-width: 500px; 
      padding: 0;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
  }

  .mobile-brand {
      margin-bottom: 2rem;
  }
  
  .mobile-brand h1 {
      font-size: 2.25rem;
  }
  
  .mobile-brand h1 svg {
      width: 36px;
      height: 36px;
  }

  .slider-tabs {
      margin-bottom: 2rem;
  }
  
  .form-title {
      font-size: 2rem;
  }
  
  .form-subtitle {
      font-size: 0.875rem;
  }
  
  .bottom-sheet {
      display: none;
  }
}

@media(min-width:1024px){
  .auth-form-container{
      padding: 3rem 4rem;
  }
  
  .auth-form-wrapper {
      max-width: 520px;
  }
  
  .mobile-brand h1 {
      font-size: 2.5rem;
  }
  
  .mobile-brand h1 svg {
      width: 40px;
      height: 40px;
  }
  
  .floating-icon {
      opacity: 0.1;
  }
}

@media(max-width:767px){.side-sheet{display:none}}
@media(max-height:700px){.form-header{margin-bottom:1rem}.form-grid{gap:0.75rem}.divider{margin:1rem 0}.slider-tabs{margin-bottom:1rem}}
</style>
</head>
<body>

<!-- Floating CRM Background -->
<div class="floating-bg">
    <!-- CRM Icons -->
    <!-- Users/Contacts -->
    <div class="floating-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
    <!-- Analytics/Chart -->
    <div class="floating-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    </div>
    <!-- Calendar/Schedule -->
    <div class="floating-icon">

let selectedCategory='GYM';
let isResetMode = false;

function toggleResetMode() {
  isResetMode = !isResetMode;
  const passGroup = document.getElementById('passwordGroup');
  const loginBtn = document.getElementById('loginBtn');
  const forgotLink = document.getElementById('forgotLink');
  const formTitle = document.getElementById('loginHeaderTitle');
  const loginPass = document.getElementById('loginPass');

  if (isResetMode) {
      passGroup.classList.add('collapsed');
      setButtonState(loginBtn, 'idle', 'RESET');
      forgotLink.textContent = 'BACK TO LOGIN';
      formTitle.textContent = 'RESET PASSWORD';
      loginPass.removeAttribute('required');
  } else {
      passGroup.classList.remove('collapsed');
      setButtonState(loginBtn, 'idle', 'SIGN IN');
      forgotLink.textContent = 'FORGOT PASSWORD?';
      formTitle.textContent = 'WELCOME BACK';
      loginPass.setAttribute('required', 'true');
  }
}

function handleForgotClick() {
  const isMobile = window.innerWidth < 768;
  if (!isMobile) {
      toggleResetMode();
  } else {
      openSheet('forgot');
  }
}

function switchTab(tab){
  let index = tab === 'login' ? 0 : 1;
  if(isResetMode && tab === 'signup') {
      toggleResetMode();
  }
  
  const authTabs = document.querySelectorAll('.auth-form-wrapper > .slider-tabs .slider-tab');
  authTabs.forEach(t=>t.classList.remove('active'));
  authTabs[index].classList.add('active');
  
  document.getElementById('authTabSlider').style.transform = `translateX(${index * 100}%)`;

  document.querySelectorAll('.form-section').forEach(f=>f.classList.remove('active'));
  document.getElementById(tab+'Form').classList.add('active');
  resetButtons()
}

function togglePassword(id){
  const input=document.getElementById(id);
  input.type=input.type==='password'?'text':'password'
}

function selectCategory(el, index){
  const tabs = el.parentElement.querySelectorAll('.slider-tab');
  tabs.forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  selectedCategory=el.textContent;
  
  document.getElementById('categoryTabSlider').style.transform = `translateX(${index * 100}%)`;
}

function setButtonState(btn,state,text,isGoogle=false){
  btn.disabled=state!=='idle';
  btn.classList.remove('btn-success','btn-error','btn-shake');
  const innerWrap = `<span>${text}</span>`;
  if(state==='loading'){btn.innerHTML=icons.spinner+innerWrap}
  else if(state==='success'){btn.classList.add('btn-success');btn.innerHTML=icons.check+innerWrap}
  else if(state==='error'){btn.classList.add('btn-error','btn-shake');btn.innerHTML=icons.error+innerWrap}
  else{btn.innerHTML=(isGoogle?icons.google:'')+innerWrap}
}

function resetButtons(){
  setButtonState(document.getElementById('loginBtn'), 'idle', isResetMode ? 'RESET' : 'SIGN IN');
  setButtonState(document.getElementById('signupBtn'),'idle','CREATE ACCOUNT');
  setButtonState(document.getElementById('googleLoginBtn'),'idle','CONTINUE WITH GOOGLE',true);
  setButtonState(document.getElementById('googleSignupBtn'),'idle','CONTINUE WITH GOOGLE',true)
}

function markInputError(ids){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      el.classList.add('input-error');
      el.addEventListener('input',()=>el.classList.remove('input-error'),{once:true})
    }
  })
}

function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const email=document.getElementById('loginEmail').value;
  
  if (isResetMode) {
      if(!email){
          setButtonState(btn,'error','ENTER EMAIL');
          markInputError(['loginEmail']);
          setTimeout(()=>setButtonState(btn,'idle','RESET'),2000);
          return;
      }
      setButtonState(btn,'loading','SENDING...');
      setTimeout(()=>{
          setButtonState(btn,'success','LINK SENT!');
          setTimeout(() => {
              toggleResetMode();
              document.getElementById('loginEmail').value = '';
          }, 1500);
      },1200);
      return;
  }

  const pass=document.getElementById('loginPass').value;
  setButtonState(btn,'loading','SIGNING IN...');
  setTimeout(()=>{
    if(email==='TEST@TEST.COM'&&pass==='password'){
      setButtonState(btn,'success','LOGIN SUCCESSFUL!');
      setTimeout(()=>alert('Demo: Redirecting...'),1500)
    }else{
      setButtonState(btn,'error','INVALID CREDENTIALS');
      markInputError(['loginEmail','loginPass']);
      setTimeout(()=>setButtonState(btn,'idle','SIGN IN'),2000)
    }
  },1200)
}

function handleSignup(e){
  e.preventDefault();
  const btn=document.getElementById('signupBtn');
  if(!selectedCategory){
    setButtonState(btn,'error','SELECT BUSINESS TYPE');
    setTimeout(()=>setButtonState(btn,'idle','CREATE ACCOUNT'),2000);
    return
  }
  const email=document.getElementById('signupEmail').value;
  setButtonState(btn,'loading','CREATING ACCOUNT...');
  setTimeout(()=>{
    if(email==='EXISTS@TEST.COM'){
      setButtonState(btn,'error','EMAIL ALREADY EXISTS');
      markInputError(['signupEmail']);
      setTimeout(()=>setButtonState(btn,'idle','CREATE ACCOUNT'),2000)
    }else{
      setButtonState(btn,'success','ACCOUNT CREATED!');
      setTimeout(()=>{switchTab('login');resetButtons()},1500)
    }
  },1200)
}

function handleGoogleAuth(type){
  const btn=document.getElementById(type==='login'?'googleLoginBtn':'googleSignupBtn');
  setButtonState(btn,'loading','CONNECTING...');
  setTimeout(()=>{
    const success=Math.random()>0.3;
    if(success){
      setButtonState(btn,'success','AUTH SUCCESSFUL!');
      setTimeout(()=>alert('Demo: Redirecting...'),1500)
    }else{
      setButtonState(btn,'error','AUTH FAILED',true);
      setTimeout(()=>setButtonState(btn,'idle','CONTINUE WITH GOOGLE',true),2000)
    }
  },1500)
}

function openSheet(type){
  const isMobile=window.innerWidth<768;
  const overlay=document.getElementById('sheetOverlay');
  
  let sheet, title, content;
  
  if (!isMobile && type === 'forgot') {
    sheet = document.getElementById('pcDialog');
    title = document.getElementById('dialogTitle');
    content = document.getElementById('dialogContent');
  } else {
    sheet = isMobile ? document.getElementById('bottomSheet') : document.getElementById('sideSheet');
    title = isMobile ? document.getElementById('sheetTitle') : document.getElementById('sideSheetTitle');
    content = isMobile ? document.getElementById('sheetContent') : document.getElementById('sideSheetContent');
  }
  
  document.querySelectorAll('.sheet-close').forEach(btn => {
    btn.style.display = (type === 'forgot' && isMobile) ? 'none' : 'block';
  });

  let html='';
  if(type==='forgot'){
    title.textContent='FORGOT PASSWORD?';
    html=`<div style="width: 100%;"><div class="form-group" style="margin-bottom:1rem; width: 100%;"><input type="email" class="form-input" id="resetEmail" placeholder="NAME@BUSINESS.COM" style="width: 100%;"></div><button class="btn btn-primary btn-text" id="resetBtn" onclick="handleReset()" style="width: 100%;"><span>SUBMIT</span></button></div>`
  }else if(type==='terms'){
    title.textContent='TERMS';
    html=`<div style="color:var(--text-secondary);font-size:0.8rem;line-height:1.6"><p>Terms of Service placeholder.</p></div>`
  }else if(type==='privacy'){
    title.textContent='PRIVACY';
    html=`<div style="color:var(--text-secondary);font-size:0.8rem;line-height:1.6"><p>Privacy Policy placeholder.</p></div>`
  }
  
  content.innerHTML=html;
  overlay.classList.add('active');
  sheet.classList.add('active');
}

function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('active');
  document.getElementById('bottomSheet').classList.remove('active');
  document.getElementById('sideSheet').classList.remove('active');
  document.getElementById('pcDialog').classList.remove('active');
}

function handleReset(){
  const btn=document.getElementById('resetBtn');
  const email=document.getElementById('resetEmail').value;
  if(!email){
    setButtonState(btn,'error','ENTER EMAIL');
    markInputError(['resetEmail']);
    setTimeout(()=>setButtonState(btn,'idle','SUBMIT'),2000);
    return
  }
  setButtonState(btn,'loading','SENDING...');
  setTimeout(()=>{
    setButtonState(btn,'success','LINK SENT!');
    setTimeout(closeSheet,1500)
  },1200)
}
</script>
</body>
</html>
